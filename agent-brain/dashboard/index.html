<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valis — Dorf-Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #2d333b;
    --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
    --amber: #d29922; --red: #f85149; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
    padding: 16px; min-height: 100vh;
  }
  header {
    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  h1 { font-size: 20px; font-weight: 600; }
  h1 .sub { color: var(--dim); font-size: 13px; font-weight: 400; margin-left: 8px; }
  .stat { color: var(--dim); font-size: 13px; }
  .stat b { color: var(--text); font-weight: 600; }
  #status-dot {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: var(--red); margin-right: 5px; transition: background .3s;
  }
  #status-dot.ok { background: var(--green); }

  .grid { display: grid; grid-template-columns: 1fr 380px; gap: 16px; }
  @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; margin-bottom: 16px;
  }
  .panel h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--dim); margin-bottom: 10px; font-weight: 600;
  }

  /* Agent cards */
  #agents { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .agent {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .agent .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .agent .name { font-weight: 600; font-size: 15px; }
  .agent .role { color: var(--purple); font-size: 12px; }
  .agent .pos { color: var(--dim); font-size: 12px; font-family: Consolas, monospace; }
  .agent .intent { margin: 6px 0; font-size: 13px; }
  .agent .intent .hint {
    display: inline-block; background: #1f3b57; color: var(--accent);
    border-radius: 4px; padding: 0 6px; font-size: 11px; margin-right: 6px;
  }
  .agent .reason { color: var(--dim); font-size: 12px; font-style: italic; }
  .agent .council {
    margin-top: 6px; font-size: 12px; color: var(--amber);
    border-left: 2px solid var(--amber); padding-left: 7px;
  }
  .chips { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    background: #21262d; border: 1px solid var(--border); border-radius: 10px;
    padding: 1px 8px; font-size: 11px; color: var(--text); font-family: Consolas, monospace;
  }
  .chip b { color: var(--green); }

  /* Chronicle */
  #chronicle { max-height: 260px; overflow-y: auto; }
  #chronicle .entry {
    padding: 6px 0 6px 12px; border-left: 2px solid var(--purple);
    margin-bottom: 6px; font-size: 13px;
  }
  #chronicle .entry:first-child { border-left-color: var(--green); }

  /* Chest */
  #chest.chips { margin-top: 0; }

  /* Event feed */
  #feed { max-height: 480px; overflow-y: auto; font-family: Consolas, monospace; font-size: 12px; }
  #feed .ev { padding: 3px 0; border-bottom: 1px solid #1c2128; display: flex; gap: 8px; }
  #feed .t { color: var(--dim); flex-shrink: 0; }
  #feed .WARNING { color: var(--amber); }
  #feed .ERROR { color: var(--red); }
  #feed .m.council { color: var(--amber); }
  #feed .m.chronicle { color: var(--purple); }
  #feed .m.build { color: var(--green); }
  .filters { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .filters button {
    background: #21262d; color: var(--dim); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 10px; font-size: 12px; cursor: pointer;
  }
  .filters button.on { background: #1f3b57; color: var(--accent); border-color: var(--accent); }
  .empty { color: var(--dim); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>🏛️ Valis<span class="sub">Dorf-Dashboard</span></h1>
  <span class="stat"><span id="status-dot"></span><span id="status-text">verbinde…</span></span>
  <span class="stat">Bevölkerung <b id="population">–</b></span>
  <span class="stat">Shelter <b id="shelters">–</b></span>
  <span class="stat">LLM <b id="llm">–</b></span>
  <span class="stat">Stand <b id="timestamp">–</b></span>
</header>

<div class="grid">
  <div>
    <div class="panel">
      <h2>Dorfbewohner</h2>
      <div id="agents"><div class="empty">Warte auf Daten…</div></div>
    </div>
    <div class="panel">
      <h2>Ereignis-Feed</h2>
      <div class="filters" id="filters">
        <button data-f="" class="on">Alles</button>
        <button data-f="COUNCIL">Council</button>
        <button data-f="CHRONICLE">Chronik</button>
        <button data-f="BUILD">Bauen</button>
        <button data-f="action result">Aktionen</button>
        <button data-f="chat">Chat</button>
        <button data-f="WARNING">Warnungen</button>
      </div>
      <div id="feed"><div class="empty">Noch keine Ereignisse.</div></div>
    </div>
  </div>
  <div>
    <div class="panel">
      <h2>📜 Dorf-Chronik</h2>
      <div id="chronicle"><div class="empty">Die Geschichte beginnt erst…</div></div>
    </div>
    <div class="panel">
      <h2>Dorf-Chest</h2>
      <div id="chest" class="chips"><div class="empty">leer</div></div>
    </div>
    <div class="panel">
      <h2>Siedlung</h2>
      <div id="settlement" class="stat">–</div>
    </div>
    <div class="panel">
      <h2>Offene Anfragen</h2>
      <div id="requests"><div class="empty">keine</div></div>
    </div>
  </div>
</div>

<script>
let filter = "";
let lastEvents = [];

document.getElementById("filters").addEventListener("click", e => {
  if (e.target.tagName !== "BUTTON") return;
  filter = e.target.dataset.f;
  document.querySelectorAll("#filters button").forEach(b => b.classList.toggle("on", b === e.target));
  renderFeed(lastEvents);
});

const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function renderFeed(events) {
  lastEvents = events;
  const el = document.getElementById("feed");
  const rows = events.filter(ev => !filter || ev.msg.includes(filter) || ev.level === filter);
  if (!rows.length) { el.innerHTML = '<div class="empty">Keine passenden Ereignisse.</div>'; return; }
  el.innerHTML = rows.map(ev => {
    let cls = "";
    if (ev.msg.includes("COUNCIL")) cls = "council";
    else if (ev.msg.includes("CHRONICLE")) cls = "chronicle";
    else if (ev.msg.includes("BUILD") || ev.msg.includes("place_block")) cls = "build";
    return `<div class="ev ${ev.level}"><span class="t">${ev.time}</span><span class="m ${cls}">${esc(ev.msg)}</span></div>`;
  }).join("");
}

function renderAgents(agents) {
  const el = document.getElementById("agents");
  if (!agents.length) { el.innerHTML = '<div class="empty">Keine Agenten aktiv.</div>'; return; }
  el.innerHTML = agents.map(a => {
    const pos = a.position.x !== undefined ? `(${a.position.x}, ${a.position.y}, ${a.position.z})` : "?";
    const inv = Object.entries(a.inventory).sort((x, y) => y[1] - x[1]).slice(0, 10)
      .map(([k, v]) => `<span class="chip"><b>${v}</b>× ${esc(k)}</span>`).join("") || '<span class="empty">leeres Inventar</span>';
    return `<div class="agent">
      <div class="head">
        <span><span class="name">${esc(a.name)}</span> <span class="role">${esc(a.personality)}</span></span>
        <span class="pos">${pos} · t${a.tick}</span>
      </div>
      <div class="intent"><span class="hint">${esc(a.action_hint || "…")}</span>${esc(a.intent || "wartet auf Entscheidung")}</div>
      ${a.reason ? `<div class="reason">„${esc(a.reason)}"</div>` : ""}
      ${a.council_assignment ? `<div class="council">⚖️ ${esc(a.council_assignment)}</div>` : ""}
      <div class="chips">${inv}</div>
    </div>`;
  }).join("");
}

function render(s) {
  document.getElementById("population").textContent = `${s.population}/${s.max_villagers}`;
  document.getElementById("shelters").textContent = s.settlement.shelters_built;
  document.getElementById("timestamp").textContent = s.timestamp;
  if (s.llm && s.llm.calls) {
    const mt = ((s.llm.prompt_tokens + s.llm.completion_tokens) / 1e6).toFixed(2);
    document.getElementById("llm").textContent = `${mt} MTok / ${s.llm.calls} Calls`;
  }
  renderAgents(s.agents);
  renderFeed(s.events);

  const chr = document.getElementById("chronicle");
  chr.innerHTML = s.settlement.chronicle.length
    ? s.settlement.chronicle.slice().reverse().map(e => `<div class="entry">${esc(e)}</div>`).join("")
    : '<div class="empty">Die Geschichte beginnt erst…</div>';

  const chest = document.getElementById("chest");
  const items = Object.entries(s.settlement.chest).sort((a, b) => b[1] - a[1]);
  chest.innerHTML = items.length
    ? items.map(([k, v]) => `<span class="chip"><b>${v}</b>× ${esc(k)}</span>`).join("")
    : '<div class="empty">leer</div>';

  const c = s.settlement.center;
  document.getElementById("settlement").innerHTML = c
    ? `Zentrum <b>(${c[0]}, ${c[1]}, ${c[2]})</b> · Crafting-Tables: <b>${s.settlement.crafting_tables.length}</b>`
    : "Noch kein Zentrum etabliert.";

  const rq = document.getElementById("requests");
  rq.innerHTML = s.settlement.pending_requests.length
    ? s.settlement.pending_requests.map(r => `<div class="stat">📨 <b>${esc(r.from)}</b> braucht ${esc(r.item)}</div>`).join("")
    : '<div class="empty">keine</div>';
}

async function poll() {
  try {
    const r = await fetch("/api/state");
    if (!r.ok) throw new Error(r.status);
    render(await r.json());
    document.getElementById("status-dot").classList.add("ok");
    document.getElementById("status-text").textContent = "live";
  } catch {
    document.getElementById("status-dot").classList.remove("ok");
    document.getElementById("status-text").textContent = "getrennt";
  }
}
poll();
setInterval(poll, 2000);
</script>
</body>
</html>
