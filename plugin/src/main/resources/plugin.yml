name: valis-core
version: "${version}"
main: com.valis.ValisPlugin
api-version: "26.1.2"
depend: [Citizens, ProtocolLib]
description: AI agent civilization simulation in Minecraft
author: Project Valis

commands:
  valis:
    description: Valis agent control commands
    usage: /valis <spawn|despawn|list|status>
    permission: valis.admin

permissions:
  valis.admin:
    description: Access to Valis admin commands
    default: op
